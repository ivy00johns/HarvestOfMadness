<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harvest of Madness</title>
    <link rel="icon" href="data:," />
    <!-- SpaceCon design-system fonts (display / body / mono). display=swap so
         text paints immediately; src/main.ts awaits document.fonts.ready (with a
         guarded timeout) before booting Phaser so glyphs measure with the real
         font. See src/obs/theme.ts for the family stacks. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #101014;
        color: #e6e6e6;
        font-family: ui-monospace, Menlo, monospace;
      }
      /* Fullscreen, no letterbox: the canvas tracks the window via
         Phaser.Scale.RESIZE (see src/main.ts). */
      #game {
        width: 100vw;
        height: 100vh;
      }
      #game canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
